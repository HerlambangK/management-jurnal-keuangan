name: CI-CD Production Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Build Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend install dependencies
        working-directory: budget-tracker-frontend-final-main
        run: npm ci

      - name: Frontend production build
        working-directory: budget-tracker-frontend-final-main
        env:
          NEXT_PUBLIC_API_DEV_BASE_URL_V1: /api/v1
          NODE_ENV: production
        run: npm run build

      - name: Backend install dependencies
        working-directory: budget-tracker-backend-final
        run: npm ci

      - name: Backend syntax checks
        working-directory: budget-tracker-backend-final
        run: |
          node --check src/server.js
          node --check src/app.js
          node --check src/routes.js

  deploy:
    name: Deploy To VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 40

    steps:
      - name: Notify Telegram (deploy started)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets not set, skipping notification."
            exit 0
          fi

          MESSAGE=$(cat <<EOF
          DEPLOY STARTED
          Repo: ${GITHUB_REPOSITORY}
          Branch: ${GITHUB_REF_NAME}
          Commit: ${GITHUB_SHA}
          Actor: ${GITHUB_ACTOR}
          Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )

          if ! curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"; then
            echo "::warning::Failed to send Telegram start notification. Check TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID."
          fi

      - name: Validate deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST || vars.VPS_HOST || '31.97.222.155' }}
          VPS_USER: ${{ secrets.VPS_USER || vars.VPS_USER || 'root' }}
          VPS_PORT: ${{ secrets.VPS_PORT || vars.VPS_PORT || '2221' }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          missing=0

          if [ -z "${VPS_SSH_KEY}" ]; then
            echo "::error::Missing required secret VPS_SSH_KEY"
            missing=1
          fi

          if [ "${missing}" -ne 0 ]; then
            exit 1
          fi

      - name: Validate SSH key format
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          tmp_key="$(mktemp)"
          printf '%s\n' "${VPS_SSH_KEY}" > "${tmp_key}"
          chmod 600 "${tmp_key}"

          if ! ssh-keygen -y -f "${tmp_key}" >/dev/null 2>&1; then
            echo "::error::VPS_SSH_KEY is invalid. Paste only private key content from BEGIN to END, without quotes or KEY=VALUE prefix."
            rm -f "${tmp_key}"
            exit 1
          fi

          rm -f "${tmp_key}"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST || vars.VPS_HOST || '31.97.222.155' }}
          username: ${{ secrets.VPS_USER || vars.VPS_USER || 'root' }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || vars.VPS_PORT || 22 }}
          script_stop: true
          timeout: 10m
          command_timeout: 60m
          script: |
            set -Eeuo pipefail

            APP_DIR="${{ secrets.VPS_APP_DIR || vars.VPS_APP_DIR || '/opt/financial-app' }}"
            REPO_URL="${{ secrets.VPS_REPO_URL || vars.VPS_REPO_URL || 'https://github.com/HerlambangK/management-jurnal-keuangan.git' }}"

            if [ ! -d "${APP_DIR}/.git" ]; then
              mkdir -p "$(dirname "${APP_DIR}")"
              git clone "${REPO_URL}" "${APP_DIR}"
            fi

            cd "${APP_DIR}"
            git config --global --add safe.directory "${APP_DIR}"
            if [ -n "$(git status --porcelain)" ]; then
              git stash push --include-untracked --message "ci-cd-auto-stash-${GITHUB_RUN_ID:-manual}" || true
            fi
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            bash ./deploy/server-deploy.sh

      - name: Notify Telegram (deploy success)
        if: ${{ success() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets not set, skipping notification."
            exit 0
          fi

          MESSAGE=$(cat <<EOF
          DEPLOY SUCCESS
          Repo: ${GITHUB_REPOSITORY}
          Branch: ${GITHUB_REF_NAME}
          Commit: ${GITHUB_SHA}
          Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )

          if ! curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"; then
            echo "::warning::Failed to send Telegram success notification. Check TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID."
          fi

      - name: Notify Telegram (deploy failed)
        if: ${{ failure() }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          if [ -z "${TELEGRAM_BOT_TOKEN}" ] || [ -z "${TELEGRAM_CHAT_ID}" ]; then
            echo "Telegram secrets not set, skipping notification."
            exit 0
          fi

          MESSAGE=$(cat <<EOF
          DEPLOY FAILED
          Repo: ${GITHUB_REPOSITORY}
          Branch: ${GITHUB_REF_NAME}
          Commit: ${GITHUB_SHA}
          Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )

          if ! curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"; then
            echo "::warning::Failed to send Telegram failure notification. Check TELEGRAM_BOT_TOKEN and TELEGRAM_CHAT_ID."
          fi
