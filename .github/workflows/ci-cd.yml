name: CI-CD Production Deploy

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: production-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  ci:
    name: Build Checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Frontend install dependencies
        working-directory: budget-tracker-frontend-final-main
        run: npm ci

      - name: Frontend production build
        working-directory: budget-tracker-frontend-final-main
        env:
          NEXT_PUBLIC_API_DEV_BASE_URL_V1: /api/v1
          NODE_ENV: production
        run: npm run build

      - name: Backend install dependencies
        working-directory: budget-tracker-backend-final
        run: npm ci

      - name: Backend syntax checks
        working-directory: budget-tracker-backend-final
        run: |
          node --check src/server.js
          node --check src/app.js
          node --check src/routes.js

  deploy:
    name: Deploy To VPS
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    timeout-minutes: 40

    steps:
      - name: Notify Telegram (deploy started)
        if: ${{ secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE=$(cat <<EOF
          DEPLOY STARTED
          Repo: ${GITHUB_REPOSITORY}
          Branch: ${GITHUB_REF_NAME}
          Commit: ${GITHUB_SHA}
          Actor: ${GITHUB_ACTOR}
          Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )

          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"

      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script_stop: true
          timeout: 60s
          command_timeout: 30m
          script: |
            set -Eeuo pipefail

            APP_DIR="${{ secrets.VPS_APP_DIR }}"
            if [ -z "${APP_DIR}" ]; then
              APP_DIR="/opt/financial-app"
            fi

            REPO_URL="${{ secrets.VPS_REPO_URL }}"
            if [ -z "${REPO_URL}" ]; then
              REPO_URL="https://github.com/HerlambangK/management-jurnal-keuangan.git"
            fi

            if [ ! -d "${APP_DIR}/.git" ]; then
              mkdir -p "$(dirname "${APP_DIR}")"
              git clone "${REPO_URL}" "${APP_DIR}"
            fi

            cd "${APP_DIR}"
            git fetch origin main
            git checkout main
            git pull --ff-only origin main

            bash ./deploy/server-deploy.sh

      - name: Notify Telegram (deploy success)
        if: ${{ success() && secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE=$(cat <<EOF
          DEPLOY SUCCESS
          Repo: ${GITHUB_REPOSITORY}
          Branch: ${GITHUB_REF_NAME}
          Commit: ${GITHUB_SHA}
          Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )

          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"

      - name: Notify Telegram (deploy failed)
        if: ${{ failure() && secrets.TELEGRAM_BOT_TOKEN != '' && secrets.TELEGRAM_CHAT_ID != '' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          MESSAGE=$(cat <<EOF
          DEPLOY FAILED
          Repo: ${GITHUB_REPOSITORY}
          Branch: ${GITHUB_REF_NAME}
          Commit: ${GITHUB_SHA}
          Run: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}
          EOF
          )

          curl -fsS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${TELEGRAM_CHAT_ID}" \
            --data-urlencode "text=${MESSAGE}"
